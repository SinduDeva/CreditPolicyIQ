[logger]
level = "info"

[client]
# Maximum size for file uploads in MB (default: 200)
maxUploadSize = 500

[server]
# Determines if app is run on save
runOnSave = true

[theme]
# Theme configuration
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#31333F"
font = "sans serif"

